name: Deploy PRD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dreis2003/ms-auth

jobs:
  build-and-push:
    name: Build and Push Docker Image PRD
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn clean verify

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:prd-${{ github.sha }} \
            -t $IMAGE_NAME:prd-latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:prd-${{ github.sha }}
          docker push $IMAGE_NAME:prd-latest

