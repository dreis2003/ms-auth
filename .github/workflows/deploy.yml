name: Build and Deploy

on:
  push:
    branches:
      - hml
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dreis2003/ms-auth
  APP_NAME: ms-auth
  GITOPS_REPO: dreis2003/homelab-gitops

jobs:
  build-and-push:
    name: Build, Push and Update GitOps
    runs-on: ubuntu-latest

    environment: ${{ github.ref_name == 'main' && 'prd' || 'hml' }}

    steps:
      - name: Define environment variables
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENV_NAME=prd" >> $GITHUB_ENV
            echo "IMAGE_TAG=prd-${GITHUB_SHA}" >> $GITHUB_ENV
            echo "OVERLAY_PATH=ikon-brasil/overlays/prd" >> $GITHUB_ENV
          else
            echo "ENV_NAME=hml" >> $GITHUB_ENV
            echo "IMAGE_TAG=hml-${GITHUB_SHA}" >> $GITHUB_ENV
            echo "OVERLAY_PATH=ikon-brasil/overlays/hml" >> $GITHUB_ENV
          fi

      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn clean verify

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${IMAGE_TAG} \
            -t $IMAGE_NAME:${ENV_NAME}-latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${IMAGE_TAG}
          docker push $IMAGE_NAME:${ENV_NAME}-latest

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.HOMELAB_GITOPS_TOKEN }}
          path: homelab-gitops
          ref: main

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Update image tag in GitOps
        working-directory: homelab-gitops
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          cd ${OVERLAY_PATH}

          kustomize edit set image ${IMAGE_NAME}=${IMAGE_NAME}:${IMAGE_TAG}

          git add kustomization.yaml

          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
          else
            git commit -m "deploy(${ENV_NAME}): update ${APP_NAME} to ${IMAGE_TAG}"
            git push origin main
          fi