spring:
  application:
    name: ms-auth
  profiles:
    active: dev
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    create-schemas: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

ikon:
  auth:
    access-token-minutos: 15
    refresh-token-dias: 30
    jwt-secret: ${JWT_SECRET:ikon-auth-dev-secret-change-me-ikon-auth-dev-secret-change-me}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
